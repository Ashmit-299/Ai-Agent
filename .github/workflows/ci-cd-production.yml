name: CI/CD Production Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run core tests only
      run: |
        python -m pytest tests/test_auth_security.py::TestAuthSecurity::test_hash_password_bcrypt -v
        python -m pytest tests/test_auth_security.py::TestAuthSecurity::test_verify_password_bcrypt -v
        python -m pytest tests/test_auth_security.py::TestAuthSecurity::test_user_register_model_validation -v
        python -m pytest tests/test_auth_security.py::TestAuthSecurity::test_user_model -v
      env:
        DATABASE_URL: sqlite:///test.db
        JWT_SECRET_KEY: test-secret-key
        ENVIRONMENT: test

  build-and-deploy:
    needs: [security-scan, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Render
      run: |
        echo "Deployment triggered for production"
        # Render auto-deploys on main branch push