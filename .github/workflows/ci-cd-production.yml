name: CI/CD Production Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  code-quality:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety black isort flake8
          
      - name: Security scan with Bandit
        run: bandit -r . -f json -o bandit-report.json || true
        
      - name: Dependency security check
        run: safety check --json --output safety-report.json || true
        
      - name: Code formatting check
        run: |
          black --check --diff .
          isort --check-only --diff .
          
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
      - name: Run tests with proper error handling
        run: |
          python -m pytest tests/ -v --tb=short --maxfail=5
        continue-on-error: false
        
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: |
            bandit-report.json
            safety-report.json

  build-and-deploy:
    name: Build & Deploy
    needs: [security-scan, code-quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run database migrations
        run: |
          python scripts/migration/run_migrations.py upgrade
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          
      - name: Build application
        run: |
          echo "Building application..."
          python -c "from app.main import app; print('✅ Application builds successfully')"
          
      - name: Deploy to Render
        if: success()
        run: |
          echo "🚀 Deploying to production..."
          if ! response=$(curl -f --max-time 60 --silent --show-error --write-out "HTTP %{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" 2>&1); then
            echo "❌ Deployment webhook failed: $response"
            exit 1
          fi
          echo "✅ Deployment webhook triggered successfully: $response"
          
      - name: Health check
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30
          
          # Retry health check up to 5 times with proper error handling
          for i in {1..5}; do
            echo "Health check attempt $i/5"
            if response=$(curl -f --max-time 30 --silent --show-error --write-out "HTTP %{http_code}" https://ai-agent-aff6.onrender.com/health 2>&1); then
              echo "✅ Health check passed on attempt $i: $response"
              exit 0
            else
              echo "❌ Health check failed on attempt $i: $response"
              if [ $i -lt 5 ]; then
                echo "Retrying in 15 seconds..."
                sleep 15
              fi
            fi
          done
          
          echo "💥 Health check failed after 5 attempts - deployment may have issues"
          echo "Please check the application logs and deployment status"
          exit 1
          
      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "🔗 Production: https://ai-agent-aff6.onrender.com"