name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Clear pip cache and install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge
        cat requirements.txt
        pip install --no-cache-dir -r requirements.txt
    
    - name: Test imports
      run: |
        python -c "import app.main; print('FastAPI app imports successfully')"
        python -c "import streamlit_dashboard; print('Dashboard imports successfully')"
    
    - name: Run basic tests
      run: |
        python test_dashboard.py
        python test_streamlit_fix.py