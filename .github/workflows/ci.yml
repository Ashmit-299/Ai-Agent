name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Verify and install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge
        echo "=== Current requirements.txt ==="
        cat requirements.txt
        echo "=== Installing with no cache ==="
        pip install --no-cache-dir --force-reinstall -r requirements.txt
    
    - name: Test imports
      run: |
        python -c "import app.main; print('FastAPI app imports successfully')"
        python -c "import streamlit_dashboard; print('Dashboard imports successfully')"
    
    - name: Run import tests (CI environment)
      run: |
        echo "Running tests in CI environment (no API server expected)"
        python test_streamlit_fix.py
        python test_ci_simulation.py