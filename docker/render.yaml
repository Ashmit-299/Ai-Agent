services:
  - type: web
    name: ai-uploader-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWS_SECRET
        from: secret
      - key: DATABASE_URL
        from: secret
      - key: POSTHOG_API_KEY
        from: secret
      - key: SENTRY_DSN
        from: secret
      - key: JWT_SECRET_KEY
        from: secret
      - key: PERPLEXITY_API_KEY
        from: secret
      - key: BHIV_LM_URL
        value: https://api.perplexity.ai
      - key: BHIV_STORAGE_BACKEND
        value: local
    disk:
      name: ai-uploader-data
      mountPath: /opt/render/project/src/data
      sizeGB: 2